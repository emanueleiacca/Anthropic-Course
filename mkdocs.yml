site_name: Anthropic Academy
site_description: Topic-first knowledge base on Claude, agent systems, MCP, prompting, API workflows, and Claude Code.
docs_dir: .
site_dir: site
use_directory_urls: true

exclude_docs: |
  README.md
  requirements.txt
  mkdocs.yml
  site/
  .github/
  .gitignore

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: white
      accent: blue

plugins:
  - search
  - awesome-nav

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css
